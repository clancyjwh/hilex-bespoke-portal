<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail | Hilex</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 0;
            cursor: pointer;
            font-weight: 600;
            position: relative;
            transition: var(--transition-smooth);
        }

        .tab-btn.active {
            color: var(--accent-cyan);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan-glow);
        }

        .insight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .insight-card {
            padding: 1.5rem;
            transition: var(--transition-smooth);
        }

        .score-gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .score-display {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
            margin: 1.5rem 0;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-cyan);
            transition: width 1s ease-out;
        }

        .indicator-chip {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="container" style="padding-top: 4rem; padding-bottom: 4rem;">
        <nav style="margin-bottom: 2rem;">
            <a href="index.html"
                style="color: var(--accent-cyan); text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Back to Dashboard
            </a>
        </nav>

        <header id="project-header" style="margin-bottom: 3rem;">
            <h1 id="project-title" class="text-gradient" style="font-size: 3rem; margin-bottom: 0.5rem;">Loading
                Project...</h1>
            <p id="project-desc" style="color: var(--text-secondary);">Retrieving analytical blueprint</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="insights">Key Insights</button>
            <button class="tab-btn" data-tab="analysis">In-depth Analysis</button>
            <button class="tab-btn" data-tab="files">File Portal</button>
        </div>

        <div id="tab-content">
            <!-- Content dynamically loaded here -->
            <div id="insights-view" class="tab-pane active">
                <div class="glass-panel score-gauge-container">
                    <div
                        style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 1rem;">
                        Overall Optimization Score</div>
                    <div id="overall-score" class="score-display">--</div>
                    <div style="width: 100%; max-width: 400px;">
                        <div class="progress-bar-container">
                            <div id="score-progress" class="progress-bar-fill" style="width: 0%;"></div>
                        </div>
                        <p id="overall-signal"
                            style="color: var(--text-secondary); font-size: 0.9rem; font-style: italic;"></p>
                    </div>
                </div>

                <div id="insights-grid" class="insight-grid">
                    <!-- Dynamic insight cards -->
                </div>
            </div>

            <div id="analysis-view" class="tab-pane" style="display: none;">
                <div class="glass-panel" style="padding: 3rem; text-align: center;">
                    <h2 style="margin-bottom: 1rem;">Detailed Empirical Analysis</h2>
                    <p style="color: var(--text-secondary);">Our pattern recognition models are processing the
                        deep-layer variables.</p>
                </div>
            </div>

            <div id="files-view" class="tab-pane" style="display: none;">
                <div id="file-portal" class="glass-panel" style="padding: 3rem; text-align: center;">
                    <h2 style="margin-bottom: 1rem;">Secure File Exchange</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Upload proprietary datasets or
                        download final reports.</p>
                    <button class="primary-button">Upload Dataset</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function loadProjectDetails() {
            if (!projectId) return;

            try {
                // Load Project
                const { data: project, error } = await supabase
                    .from('bespoke_projects')
                    .select('*')
                    .eq('id', projectId)
                    .single();

                if (error) throw error;

                document.getElementById('project-title').innerText = project.title;
                document.getElementById('project-desc').innerText = project.description || 'Analytical blueprint for ' + project.title;

                // Update Score
                const score = project.overarching_score || 0;
                const scoreDisplay = document.getElementById('overall-score');
                scoreDisplay.innerText = (score > 0 ? '+' : '') + score;
                scoreDisplay.style.color = getScoreColor(score);

                // Animate progress bar (mapping -10 to 10 onto 0% to 100%)
                const percentage = ((score + 10) / 20) * 100;
                setTimeout(() => {
                    document.getElementById('score-progress').style.width = percentage + '%';
                    document.getElementById('score-progress').style.background = getScoreColor(score);
                }, 100);

                // Load Insights
                const { data: insights } = await supabase
                    .from('project_insights')
                    .select('*')
                    .eq('project_id', projectId)
                    .order('display_order');

                const grid = document.getElementById('insights-grid');
                if (insights && insights.length > 0) {
                    grid.innerHTML = insights.map(i => `
                        <div class="glass-panel insight-card">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                <span style="font-weight: 700; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase;">${i.title}</span>
                                <span class="indicator-chip" style="background: ${getScoreColor(i.value)}22; color: ${getScoreColor(i.value)}; border: 1px solid ${getScoreColor(i.value)}44;">
                                    ${i.value > 0 ? '+' : ''}${i.value}
                                </span>
                            </div>
                            <p style="font-size: 0.95rem;">${i.description}</p>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 2rem;">No specific insights logged yet. Analysis in progress.</div>';
                }

            } catch (err) {
                console.error('Error loading project:', err);
            }
        }

        function getScoreColor(score) {
            if (score > 5) return 'var(--accent-green)';
            if (score > 0) return 'var(--accent-cyan)';
            if (score === 0) return '#FFFFFF';
            if (score > -5) return 'var(--accent-yellow)';
            return 'var(--accent-red)';
        }

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');

                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-view').style.display = 'block';
            });
        });

        loadProjectDetails();
    </script>
</body>

</html>
