<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hilex Bespoke Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="flex-center" style="min-height: 100vh;">
    
    <div class="container" style="max-width: 480px;">
        <div class="glass-panel animate-fade-in" style="padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 25L15 15L22 22L35 9" stroke="var(--accent-cyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M25 9H35V19" stroke="var(--accent-cyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span style="font-size: 2rem; font-weight: 800; letter-spacing: 1px;">HILEX</span>
                </div>
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Welcome Back</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Please enter your credentials to access the portal</p>
            </div>

            <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="email" style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Email Address</label>
                    <input type="email" id="email" required 
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);"
                        onfocus="this.style.borderColor='var(--accent-cyan)'" onblur="this.style.borderColor='var(--border-color)'">
                </div>

                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="password" style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Password</label>
                    <input type="password" id="password" required 
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);"
                        onfocus="this.style.borderColor='var(--accent-cyan)'" onblur="this.style.borderColor='var(--border-color)'">
                </div>

                <button type="submit" class="primary-button" style="justify-content: center; margin-top: 1rem;">
                    Portal Access
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 10H16M16 10L12 6M16 10L12 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>

            <div id="error-message" style="color: var(--accent-red); margin-top: 1.5rem; text-align: center; font-size: 0.9rem; display: none;"></div>
        </div>
        
        <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.8rem;">
            Empirically Optimized Analysis. © 2026 Hilex.
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
