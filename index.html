<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hilex Bespoke Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="flex-center" style="min-height: 100vh;">

    <div class="container" style="max-width: 480px;">
        <div class="glass-panel animate-fade-in" style="padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <div style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 25L15 15L22 22L35 9" stroke="var(--accent-cyan)" stroke-width="4"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M25 9H35V19" stroke="var(--accent-cyan)" stroke-width="4" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span style="font-size: 1.6rem; font-weight: 800; letter-spacing: 1px; white-space: nowrap;">HilEX
                        <span
                            style="font-weight: 400; font-size: 0.9rem; vertical-align: middle; opacity: 0.7;">OPTIMIZED
                            TRENDS</span></span>
                </div>

                <div id="login-section">
                    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Portal Access</h1>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Empirically optimized analysis entry</p>
                </div>
                <div id="signup-section" style="display: none;">
                    <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Initialize Account</h1>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">Join the Hilex research network</p>
                </div>
            </div>

            <!-- Login Form -->
            <form id="login-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="email"
                        style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Email
                        Address</label>
                    <input type="email" id="email" required
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);"
                        onfocus="this.style.borderColor='var(--accent-cyan)'"
                        onblur="this.style.borderColor='var(--border-color)'">
                </div>

                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="password"
                        style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Password</label>
                    <input type="password" id="password" required
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);"
                        onfocus="this.style.borderColor='var(--accent-cyan)'"
                        onblur="this.style.borderColor='var(--border-color)'">
                </div>

                <button type="submit" class="primary-button" style="justify-content: center; margin-top: 1rem;">
                    Enter Portal
                </button>

                <div style="display: flex; align-items: center; margin: 1rem 0;">
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
                    <span style="padding: 0 1rem; color: var(--text-secondary); font-size: 0.8rem;">OR</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
                </div>

                <button type="button" class="glass-button" id="google-login-btn"
                    style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; border-color: rgba(255,255,255,0.2); color: white;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>

                <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">
                    Don't have an account? <a href="#" onclick="toggleAuthMode()"
                        style="color: var(--accent-cyan); text-decoration: none;">Sign Up</a>
                </p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" style="display: none; flex-direction: column; gap: 1.5rem;">
                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="signup-name"
                        style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Full
                        Name</label>
                    <input type="text" id="signup-name" required
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);">
                </div>

                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="signup-email"
                        style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Email
                        Address</label>
                    <input type="email" id="signup-email" required
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);">
                </div>

                <div class="input-group" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="signup-password"
                        style="font-size: 0.8rem; font-weight: 600; color: var(--accent-cyan); text-transform: uppercase;">Password</label>
                    <input type="password" id="signup-password" required
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; color: white; outline: none; transition: var(--transition-smooth);">
                </div>

                <button type="submit" class="primary-button" style="justify-content: center; margin-top: 1rem;">
                    Create Account
                </button>

                <div style="display: flex; align-items: center; margin: 1rem 0;">
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
                    <span style="padding: 0 1rem; color: var(--text-secondary); font-size: 0.8rem;">OR</span>
                    <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);">
                </div>

                <button type="button" class="glass-button" id="google-signup-btn"
                    style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; border-color: rgba(255,255,255,0.2); color: white;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Continue with Google
                </button>

                <p style="text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 1rem;">
                    Already have an account? <a href="#" onclick="toggleAuthMode()"
                        style="color: var(--accent-cyan); text-decoration: none;">Log In</a>
                </p>
            </form>

            <div id="error-message"
                style="color: var(--accent-red); margin-top: 1.5rem; text-align: center; font-size: 0.9rem; display: none; padding: 10px; border: 1px solid rgba(255,61,0,0.2); border-radius: 8px; background: rgba(255,61,0,0.05);">
            </div>
        </div>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.8rem;">
            Empirically Optimized Analysis. © 2026 HilEX Optimized Trends.
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
